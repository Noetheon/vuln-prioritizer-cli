name: Example Consumer Workflow - SARIF Upload

on:
  workflow_dispatch:
  pull_request:

jobs:
  prioritize:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run vuln-prioritizer action
        id: prioritize
        uses: Noetheon/vuln-prioritizer-cli@main
        with:
          mode: analyze
          input: trivy-results.json
          input-format: trivy-json
          output-format: sarif
          output-path: results.sarif
          fail-on: high

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.prioritize.outputs.report-path }}
