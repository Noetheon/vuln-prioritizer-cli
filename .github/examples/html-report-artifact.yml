name: Example Consumer Workflow - HTML Report

on:
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate analysis JSON
        id: analyze
        uses: Noetheon/vuln-prioritizer-cli@main
        with:
          mode: analyze
          input: trivy-results.json
          input-format: trivy-json
          output-format: json
          output-path: analysis.json

      - name: Render static HTML report
        id: render
        uses: Noetheon/vuln-prioritizer-cli@main
        with:
          mode: report-html
          input: ${{ steps.analyze.outputs.report-path }}
          output-path: report.html

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: vuln-prioritization-report
          path: ${{ steps.render.outputs.report-path }}
